<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SeenIt Settings</title>
    <link rel="stylesheet" href="popup.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #10b981;">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <h1>SeenIt</h1>
            </div>
        </header>
        
        <main>
            <div class="stats-card">
                <h2>Your Statistics</h2>
                <div class="stat-row">
                    <span class="stat-label">Seen:</span>
                    <span class="stat-value" id="stats-seen">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Favorites:</span>
                    <span class="stat-value" id="stats-favorites">-</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Rejected:</span>
                    <span class="stat-value" id="stats-rejected">-</span>
                </div>
            </div>

            <div class="favorites-section">
                <h2>⭐ Favorites List</h2>
                <div id="favorites-list" class="favorites-list">
                    <div class="empty-state">Nothing added yet</div>
                </div>
            </div>

            <div class="actions">
                <div class="export-group">
                    <select id="export-format" class="export-select">
                        <option value="csv">CSV</option>
                        <option value="markdown">Markdown</option>
                    </select>
                    <button id="btn-export" class="btn-primary">Export</button>
                </div>
                <button id="btn-clear" class="btn-secondary">Clear History</button>
            </div>
        </main>
    </div>
    <script src="popup.js"></script>
</body>
</html>
